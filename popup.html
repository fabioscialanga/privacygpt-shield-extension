<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body{font-family:Arial,sans-serif;width:370px;padding:14px;background:#f8fafc;color:#111827}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:12px;background:#0f172a;color:#fff;padding:12px;border-radius:12px}
    .brand img{width:44px;height:44px;border-radius:10px}
    .brand h1{font-size:18px;margin:0}
    .sub{font-size:12px;color:#cbd5e1;margin-top:4px}
    .row{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:10px;background:white;border-radius:8px;gap:10px;border:1px solid #e5e7eb}
    .row select,.row input[type="checkbox"]{flex:0 0 auto}
    .hint{font-size:11px;color:#64748b;margin:-4px 2px 8px 2px;line-height:1.35}
    .btn{width:100%;padding:10px;border:0;border-radius:8px;background:#111827;color:white;cursor:pointer;margin-top:8px}
    .btn.secondary{background:#2563eb}
    .out{white-space:pre-wrap;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px;margin-top:10px;max-height:220px;overflow:auto;font-size:12px}
  </style>
</head>
<body>
  <div class="brand">
    <img src="assets/icon128.png" alt="PrivacyGPT Shield logo">
    <div>
      <h1>PrivacyGPT Shield V3.3</h1>
      <div class="sub">Protezione dati per ChatGPT con modalità semplice e legale.</div>
    </div>
  </div>

  <div class="row"><span>Attivo</span><input id="enabled" type="checkbox"></div>

  <div class="row">
    <span>Modalità anonimizzazione</span>
    <select id="mode">
      <option value="simple">Semplice</option>
      <option value="legal">Legale</option>
    </select>
  </div>

  <div class="row">
    <span>Modalità intervento</span>
    <select id="interventionMode">
      <option value="manual">Manuale</option>
      <option value="auto">Automatica</option>
    </select>
  </div>
  <div class="hint">Manuale mostra il pulsante 🔒 Anonimizza. Automatica interviene quando invii il prompt.</div>

  <div class="row"><span>Anonimizza aziende</span><input id="maskCompanies" type="checkbox"></div>
  <div class="row"><span>Debug overlay</span><input id="debug" type="checkbox"></div>

  <button id="save" class="btn">Salva impostazioni</button>
  <button id="diag" class="btn secondary">Run diagnostics su ChatGPT</button>
  <button id="local" class="btn">Apri test locale</button>

  <div id="out" class="out">Pronto.</div>
  <div style="margin-top:10px;text-align:center;font-size:11px;color:#64748b">Created by Fabio Scialanga</div>

  <script src="popup.js"></script>
</body>
</html>
